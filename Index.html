<!DOCTYPE html>
<html lang="pa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KH90 AI Pro - Official</title>
    <style>
        :root { --primary: #f55036; --bg: #0d0d0d; --card: #1a1a1c; --text: #e0e0e0; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        header { 
            padding: 15px 30px; 
            background: var(--card); 
            border-bottom: 2px solid var(--primary); 
            display: flex; justify-content: space-between; align-items: center; 
        }
        .brand { display: flex; align-items: center; gap: 15px; }
        .logo-img { width: 60px; height: 60px; border-radius: 50%; border: 2px solid var(--primary); object-fit: cover; }
        .logo-text { font-weight: bold; color: var(--primary); font-size: 24px; }

        .download-btn {
            background: var(--primary); color: white; text-decoration: none;
            padding: 12px 25px; border-radius: 30px; font-weight: bold;
            box-shadow: 0 4px 15px rgba(245, 80, 54, 0.4); transition: 0.3s;
        }
        .download-btn:hover { transform: scale(1.05); }

        #chat-window { flex: 1; overflow-y: auto; padding: 25px; display: flex; flex-direction: column; gap: 15px; background: #0a0a0a; }
        .msg { max-width: 80%; padding: 15px 20px; border-radius: 20px; font-size: 16px; line-height: 1.5; }
        .user { align-self: flex-end; background: var(--primary); color: white; border-bottom-right-radius: 2px; }
        .ai { align-self: flex-start; background: var(--card); border: 1px solid #333; border-bottom-left-radius: 2px; }

        .input-area { padding: 20px; background: var(--card); border-top: 1px solid #333; display: flex; align-items: center; gap: 10px; }
        input { flex: 1; padding: 15px 25px; border-radius: 30px; border: 1px solid #444; background: #000; color: white; outline: none; font-size: 16px; }
        
        .circle-btn { width: 55px; height: 55px; border-radius: 50%; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 24px; transition: 0.3s; }
        .send-btn { background: var(--primary); color: white; }
        .mic-btn { background: #2a2a2e; color: var(--primary); border: 1px solid #444; }
        .active-mic { background: var(--primary); color: white; animation: pulse 1.5s infinite; }

        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
    </style>
</head>
<body>

    <header>
        <div class="brand">
            <img src="https://raw.githubusercontent.com/khushwinders701-maker/Kh90-ai/main/Logo.png" class="logo-img" alt="KH90 Logo">
            <div class="logo-text">KH90 AI Pro</div>
        </div>
        <a href="kh90 ai.apk" download class="download-btn">📥 Download APK</a>
    </header>

    <div id="chat-window">
        <div class="msg ai">ਸਤਿ ਸ਼੍ਰੀ ਅਕਾਲ! ਮੈਂ <b>KH90 AI</b> ਹਾਂ। ਤੁਸੀਂ ਮੇਰੇ ਨਾਲ ਗੱਲ ਕਰ ਸਕਦੇ ਹੋ ਜਾਂ ਉੱਪਰੋਂ ਐਪ ਡਾਊਨਲੋਡ ਕਰ ਸਕਦੇ ਹੋ।</div>
    </div>

    <div class="input-area">
        <button class="circle-btn mic-btn" id="micBtn" onclick="startListening()">🎤</button>
        <input type="text" id="userInput" placeholder="ਬੋਲੋ ਜਾਂ ਲਿਖੋ..." onkeypress="if(event.key==='Enter') sendChat()">
        <button class="circle-btn send-btn" onclick="sendChat()">➔</button>
    </div>

    <script>
        // ਤੁਹਾਡੀ API Key
        const API_KEY = "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";
        const chatWindow = document.getElementById('chat-window');
        const userInput = document.getElementById('userInput');
        const micBtn = document.getElementById('micBtn');

        const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        recognition.lang = 'pa-IN';

        function startListening() {
            try {
                recognition.start();
                micBtn.classList.add('active-mic');
            } catch (e) {
                recognition.stop();
                micBtn.classList.remove('active-mic');
            }
        }

        recognition.onresult = (event) => {
            const transcript = event.results[0][0].transcript;
            userInput.value = transcript;
            micBtn.classList.remove('active-mic');
            sendChat();
        };

        recognition.onerror = () => micBtn.classList.remove('active-mic');
        recognition.onend = () => micBtn.classList.remove('active-mic');

        async function sendChat() {
            const text = userInput.value.trim();
            if (!text) return;

            addMessage(text, 'user');
            const lowerText = text.toLowerCase();
            userInput.value = "";

            // --- App Opening Logic ---
            if (lowerText.includes("youtube") || lowerText.includes("ਯੂਟਿਊਬ")) {
                addMessage("YouTube ਖੋਲ੍ਹ ਰਿਹਾ ਹਾਂ...", 'ai');
                setTimeout(() => {
                    window.location.href = "intent://www.youtube.com/#Intent;scheme=http;package=com.google.android.youtube;end";
                }, 1000);
                return;
            }

            // --- Groq AI API Call ---
            try {
                const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: { 
                        "Authorization": `Bearer ${API_KEY}`, 
                        "Content-Type": "application/json" 
                    },
                    body: JSON.stringify({
                        model: "llama-3.3-70b-versatile",
                        messages: [{ role: "user", content: text }]
                    })
                });
                const data = await response.json();
                if(data.choices && data.choices[0]) {
                    addMessage(data.choices[0].message.content, 'ai');
                } else {
                    addMessage("ਮਾਫ ਕਰਨਾ, ਕੁਝ ਗਲਤ ਹੋਇਆ।", 'ai');
                }
            } catch (e) {
                addMessage("ਨੈੱਟਵਰਕ ਦੀ ਸਮੱਸਿਆ ਹੈ।", 'ai');
            }
        }

        function addMessage(text, sender) {
            const div = document.createElement('div');
            div.className = `msg ${sender}`;
            div.innerHTML = text.replace(/\n/g, '<br>');
            chatWindow.appendChild(div);
            chatWindow.scrollTop = chatWindow.scrollHeight;
        }
    </script>
</body>
</html>
