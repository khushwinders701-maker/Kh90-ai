<!DOCTYPE html>
<html lang="pa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KH90 AI Pro</title>
    <style>
        :root { --primary: #f55036; --bg: #0d0d0d; --card: #1a1a1c; --text: #e0e0e0; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        /* Compact Header */
        header { padding: 6px 12px; background: var(--card); border-bottom: 1px solid var(--primary); display: flex; justify-content: space-between; align-items: center; min-height: 45px; }
        .brand { display: flex; align-items: center; gap: 6px; }
        .logo-img { width: 28px; height: 28px; border-radius: 50%; border: 1px solid var(--primary); object-fit: cover; }
        .logo-text { font-weight: bold; color: var(--primary); font-size: 15px; text-transform: uppercase; }

        .nav-right { display: flex; gap: 5px; align-items: center; }
        select { background: #000; color: #fff; border: 1px solid #444; border-radius: 4px; padding: 2px; font-size: 11px; outline: none; }
        .dl-btn { background: var(--primary); color: white; text-decoration: none; padding: 4px 8px; border-radius: 12px; font-weight: bold; font-size: 10px; }

        /* Chat Window */
        #chat-window { flex: 1; overflow-y: auto; padding: 12px; display: flex; flex-direction: column; gap: 8px; background: #0a0a0a; }
        .msg { max-width: 85%; padding: 8px 12px; border-radius: 12px; font-size: 14px; line-height: 1.4; }
        .user { align-self: flex-end; background: var(--primary); color: white; border-bottom-right-radius: 2px; }
        .ai { align-self: flex-start; background: var(--card); border: 1px solid #333; border-bottom-left-radius: 2px; }

        /* Compact Input Area */
        .input-area { padding: 8px; background: var(--card); display: flex; gap: 6px; align-items: center; border-top: 1px solid #333; }
        input { flex: 1; padding: 8px 12px; border-radius: 18px; border: 1px solid #444; background: #000; color: white; outline: none; font-size: 14px; }
        .btn { width: 38px; height: 38px; border-radius: 50%; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 16px; transition: 0.2s; }
        
        .active-mic { background: var(--primary) !important; color: white; box-shadow: 0 0 10px var(--primary); }
    </style>
</head>
<body>

    <header>
        <div class="brand">
            <img src="https://raw.githubusercontent.com/khushwinders701-maker/Kh90-ai/main/Logo.png" class="logo-img" alt="L">
            <div class="logo-text">KH90 AI</div>
        </div>
        <div class="nav-right">
            <select id="langSelect">
                <option value="pa-IN">ਪੰਜਾਬੀ</option>
                <option value="hi-IN">हिन्दी</option>
                <option value="en-US">English</option>
            </select>
            <a href="https://drive.google.com/file/d/1Ss1bFFK8QuJWvo_du5fZC_QG9FMDiR14/view?usp=sharing" target="_blank" class="dl-btn">APK</a>
        </div>
    </header>

    <div id="chat-window">
        <div class="msg ai">ਸਤਿ ਸ਼੍ਰੀ ਅਕਾਲ! ਮੈਂ <b>KH90 AI</b> ਹਾਂ। ਤੁਸੀਂ ਮੇਰੇ ਨਾਲ ਬੋਲ ਕੇ ਵੀ ਗੱਲ ਕਰ ਸਕਦੇ ਹੋ।</div>
    </div>

    <div class="input-area">
        <button class="btn" style="background:#2a2a2e; color:#f55036;" id="micBtn" onclick="toggleMic()">🎤</button>
        <input type="text" id="userInput" placeholder="Type here..." onkeypress="if(event.key==='Enter') sendChat()">
        <button class="btn" style="background:#f55036; color:white;" onclick="sendChat()">➔</button>
    </div>

    <script>
        const API_KEY = "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";
        const micBtn = document.getElementById('micBtn');
        const userInput = document.getElementById('userInput');
        const chatWindow = document.getElementById('chat-window');
        
        let recognition;
        let isListening = false;

        // ਮਾਈਕ ਸੈਟਅਪ
        if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            recognition = new SpeechRecognition();
            recognition.continuous = false;
            recognition.interimResults = false;

            recognition.onstart = () => {
                isListening = true;
                micBtn.classList.add('active-mic');
            };

            recognition.onresult = (event) => {
                const text = event.results[0][0].transcript;
                userInput.value = text;
                sendChat();
            };

            recognition.onerror = (event) => {
                console.error("Mic Error:", event.error);
                stopMicUI();
            };

            recognition.onend = () => {
                stopMicUI();
            };
        }

        function toggleMic() {
            if (!recognition) {
                alert("ਤੁਹਾਡਾ ਬ੍ਰਾਊਜ਼ਰ ਮਾਈਕ ਸਪੋਰਟ ਨਹੀਂ ਕਰਦਾ।");
                return;
            }
            if (isListening) {
                recognition.stop();
            } else {
                recognition.lang = document.getElementById('langSelect').value;
                recognition.start();
            }
        }

        function stopMicUI() {
            isListening = false;
            micBtn.classList.remove('active-mic');
        }

        async function sendChat() {
            const text = userInput.value.trim();
            if (!text) return;
            addMessage(text, 'user');
            userInput.value = "";

            try {
                const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: { "Authorization": `Bearer ${API_KEY}`, "Content-Type": "application/json" },
                    body: JSON.stringify({
                        model: "llama-3.3-70b-versatile",
                        messages: [{ role: "system", content: "Reply in the language of the user." }, { role: "user", content: text }]
                    })
                });
                const data = await response.json();
                addMessage(data.choices[0].message.content, 'ai');
            } catch (e) {
                addMessage("Error! Please check internet.", 'ai');
            }
        }

        function addMessage(text, sender) {
            const div = document.createElement('div');
            div.className = `msg ${sender}`;
            div.innerHTML = text.replace(/\n/g, '<br>');
            chatWindow.appendChild(div);
            chatWindow.scrollTop = chatWindow.scrollHeight;
        }
    </script>
</body>
</html>
