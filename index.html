<!DOCTYPE html>
<html lang="pa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KH90 AI - Official Website</title>
    <style>
        :root { --primary: #f55036; --bg: #0d0d0d; --card: #1a1a1c; --text: #e0e0e0; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        /* 1. ਉੱਪਰ ਵਾਲਾ ਡਾਊਨਲੋਡ ਸੈਕਸ਼ਨ (Header) */
        header { 
            padding: 10px 20px; 
            background: var(--card); 
            border-bottom: 2px solid var(--primary); 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            z-index: 100;
        }
        .brand { display: flex; align-items: center; gap: 10px; }
        .logo-small { width: 40px; height: 40px; border-radius: 8px; border: 1px solid var(--primary); }
        .logo-text { font-weight: bold; color: var(--primary); font-size: 20px; }
        
        .download-nav-btn {
            background: var(--primary);
            color: white;
            text-decoration: none;
            padding: 8px 15px;
            border-radius: 5px;
            font-weight: bold;
            font-size: 14px;
            box-shadow: 0 4px 10px rgba(245, 80, 54, 0.3);
        }

        /* 2. ਚੈਟ ਵਿੰਡੋ (Main AI Area) */
        #chat-window { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
        .msg { max-width: 80%; padding: 12px 16px; border-radius: 15px; font-size: 15px; line-height: 1.5; }
        .user { align-self: flex-end; background: var(--primary); color: white; border-bottom-right-radius: 2px; }
        .ai { align-self: flex-start; background: var(--card); border: 1px solid #333; border-bottom-left-radius: 2px; }

        /* 3. ਇਨਪੁਟ ਏਰੀਆ */
        .input-area { padding: 15px; background: var(--card); border-top: 1px solid #333; display: flex; align-items: center; gap: 10px; }
        input { flex: 1; padding: 12px 18px; border-radius: 25px; border: 1px solid #444; background: #000; color: white; outline: none; }
        .circle-btn { width: 45px; height: 45px; border-radius: 50%; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 20px; transition: 0.2s; }
        .send-btn { background: var(--primary); color: white; }
        .mic-btn { background: #2a2a2e; color: var(--primary); border: 1px solid #444; }
        .active-mic { background: var(--primary); color: white; animation: pulse 1.5s infinite; }
        #file-input { display: none; }

        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
    </style>
</head>
<body>

    <header>
        <div class="brand">
            <img src="logo.png" class="logo-small" alt="Logo">
            <div class="logo-text">kh90 ai</div>
        </div>
        <a href="kh90 ai.apk" download class="download-nav-btn">📥 Download APK</a>
    </header>

    <div id="chat-window">
        <div class="msg ai">ਸਤਿ ਸ਼੍ਰੀ ਅਕਾਲ! ਮੈਂ KH90 AI ਹਾਂ। ਉੱਪਰ ਦਿੱਤੇ ਬਟਨ ਤੋਂ ਤੁਸੀਂ ਮੇਰੀ ਐਪ ਡਾਊਨਲੋਡ ਕਰ ਸਕਦੇ ਹੋ। ਮੈਂ ਤੁਹਾਡੀ ਕੀ ਮਦਦ ਕਰਾਂ?</div>
    </div>

    <div class="input-area">
        <button class="circle-btn mic-btn" id="micBtn" onclick="startListening()">🎤</button>
        <input type="text" id="userInput" placeholder="ਸਵਾਲ ਲਿਖੋ ਜਾਂ ਐਪ ਦਾ ਨਾਮ..." onkeypress="if(event.key==='Enter') sendChat()">
        <button class="circle-btn send-btn" onclick="sendChat()">➔</button>
        <button class="circle-btn" style="background: #444; color: white;" onclick="document.getElementById('file-input').click()">📁</button>
    </div>

    <input type="file" id="file-input" onchange="openSelectedFile(event)">

    <script>
        const API_KEY = "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";
        const chatWindow = document.getElementById('chat-window');
        const userInput = document.getElementById('userInput');
        const micBtn = document.getElementById('micBtn');

        const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        
        function startListening() {
            recognition.lang = 'pa-IN';
            recognition.start();
            micBtn.classList.add('active-mic');
        }

        recognition.onresult = (event) => {
            userInput.value = event.results[0][0].transcript;
            micBtn.classList.remove('active-mic');
            sendChat();
        };

        async function sendChat() {
            const text = userInput.value.trim().toLowerCase();
            if (!text) return;

            addMessage(userInput.value, 'user');
            userInput.value = "";

            // 1. ਐਕਸਪਰਟ ਕਮਾਂਡਸ (Expert Commands)
            if (text.includes("youtube") || text.includes("ਯੂਟਿਊਬ")) {
                addMessage("YouTube ਖੋਲ੍ਹ ਰਿਹਾ ਹਾਂ...", 'ai');
                window.location.href = "intent://www.youtube.com/#Intent;scheme=http;package=com.google.android.youtube;end";
                return;
            } 
            if (text.includes("whatsapp") || text.includes("ਵਟਸਐਪ")) {
                addMessage("WhatsApp ਖੋਲ੍ਹ ਰਿਹਾ ਹਾਂ...", 'ai');
                window.location.href = "intent://#Intent;scheme=whatsapp;package=com.whatsapp;end";
                return;
            }

            // 2. ਏਆਈ ਜਵਾਬ (Groq AI Online)
            try {
                const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: { "Authorization": `Bearer ${API_KEY}`, "Content-Type": "application/json" },
                    body: JSON.stringify({
                        model: "llama-3.3-70b-versatile",
                        messages: [{ role: "user", content: text }]
                    })
                });
                const data = await response.json();
                addMessage(data.choices[0].message.content, 'ai');
            } catch (e) {
                addMessage("Error: ਇੰਟਰਨੈੱਟ ਚੈੱਕ ਕਰੋ।", 'ai');
            }
        }

        function openSelectedFile(event) {
            const file = event.target.files[0];
            if (file) {
                const fileURL = URL.createObjectURL(file);
                addMessage("ਫਾਈਲ ਖੋਲ੍ਹ ਦਿੱਤੀ ਗਈ ਹੈ: " + file.name, 'ai');
                window.open(fileURL, "_blank");
            }
        }

        function addMessage(text, sender) {
            const div = document.createElement('div');
            div.className = `msg ${sender}`;
            div.innerText = text;
            chatWindow.appendChild(div);
            chatWindow.scrollTop = chatWindow.scrollHeight;
        }
    </script>
</body>
</html>
