<!DOCTYPE html>
<html lang="pa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KH90 AI Pro - Official Site</title>
    <style>
        :root { --primary: #f55036; --bg: #0d0d0d; --card: #1a1a1c; --text: #e0e0e0; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        header { 
            padding: 15px 30px; 
            background: var(--card); 
            border-bottom: 2px solid var(--primary); 
            display: flex; justify-content: space-between; align-items: center; 
        }
        .brand { display: flex; align-items: center; gap: 15px; }
        .logo-img { width: 50px; height: 50px; border-radius: 50%; border: 2px solid var(--primary); object-fit: cover; }
        .logo-text { font-weight: bold; color: var(--primary); font-size: 22px; }

        .download-btn {
            background: var(--primary); color: white; text-decoration: none;
            padding: 10px 20px; border-radius: 30px; font-weight: bold; font-size: 14px;
            box-shadow: 0 4px 15px rgba(245, 80, 54, 0.4);
        }

        #chat-window { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; background: #0a0a0a; }
        .msg { max-width: 80%; padding: 12px 18px; border-radius: 15px; font-size: 16px; line-height: 1.5; }
        .user { align-self: flex-end; background: var(--primary); color: white; border-bottom-right-radius: 2px; }
        .ai { align-self: flex-start; background: var(--card); border: 1px solid #333; border-bottom-left-radius: 2px; }

        .input-area { padding: 15px; background: var(--card); border-top: 1px solid #333; display: flex; align-items: center; gap: 10px; }
        input { flex: 1; padding: 12px 20px; border-radius: 30px; border: 1px solid #444; background: #000; color: white; outline: none; }
        
        .circle-btn { width: 45px; height: 45px; border-radius: 50%; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 20px; }
        .send-btn { background: var(--primary); color: white; }
        .mic-btn { background: #2a2a2e; color: var(--primary); }
        .active-mic { background: var(--primary); color: white; animation: pulse 1.5s infinite; }

        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
    </style>
</head>
<body>

    <header>
        <div class="brand">
            <img src="https://raw.githubusercontent.com/khushwinders701-maker/Kh90-ai/main/Logo.png" class="logo-img" alt="Logo">
            <div class="logo-text">KH90 AI Pro</div>
        </div>
        <a href="https://raw.githubusercontent.com/khushwinders701-maker/Kh90-ai/main/Logo.png" download="kh90_ai.apk" class="download-btn">📥 Download</a>
    </header>

    <div id="chat-window">
        <div class="msg ai">ਸਤਿ ਸ਼੍ਰੀ ਅਕਾਲ! <b>KH90 AI</b> ਹੁਣ ਲਾਈਵ ਹੈ। ਫਾਈਲ ਨਾ ਮਿਲਣ ਵਾਲੀ ਗਲਤੀ ਠੀਕ ਕਰ ਦਿੱਤੀ ਗਈ ਹੈ।</div>
    </div>

    <div class="input-area">
        <button class="circle-btn mic-btn" id="micBtn" onclick="startListening()">🎤</button>
        <input type="text" id="userInput" placeholder="ਕੁਝ ਲਿਖੋ..." onkeypress="if(event.key==='Enter') sendChat()">
        <button class="circle-btn send-btn" onclick="sendChat()">➔</button>
    </div>

    <script>
        const API_KEY = "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";
        const chatWindow = document.getElementById('chat-window');
        const userInput = document.getElementById('userInput');
        const micBtn = document.getElementById('micBtn');

        const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        recognition.lang = 'pa-IN';

        function startListening() {
            try { recognition.start(); micBtn.classList.add('active-mic'); } 
            catch (e) { recognition.stop(); micBtn.classList.remove('active-mic'); }
        }

        recognition.onresult = (event) => {
            userInput.value = event.results[0][0].transcript;
            micBtn.classList.remove('active-mic');
            sendChat();
        };

        async function sendChat() {
            const text = userInput.value.trim();
            if (!text) return;
            addMessage(text, 'user');
            userInput.value = "";

            if (text.toLowerCase().includes("youtube")) {
                addMessage("YouTube ਖੋਲ੍ਹ ਰਿਹਾ ਹਾਂ...", 'ai');
                window.location.href = "intent://www.youtube.com/#Intent;scheme=http;package=com.google.android.youtube;end";
                return;
            }

            try {
                const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: { "Authorization": `Bearer ${API_KEY}`, "Content-Type": "application/json" },
                    body: JSON.stringify({ model: "llama-3.3-70b-versatile", messages: [{ role: "user", content: text }] })
                });
                const data = await response.json();
                addMessage(data.choices[0].message.content, 'ai');
            } catch (e) {
                addMessage("ਸਰਵਰ ਨਾਲ ਕਨੈਕਟ ਨਹੀਂ ਹੋ ਸਕਿਆ।", 'ai');
            }
        }

        function addMessage(text, sender) {
            const div = document.createElement('div');
            div.className = `msg ${sender}`;
            div.innerHTML = text.replace(/\n/g, '<br>');
            chatWindow.appendChild(div);
            chatWindow.scrollTop = chatWindow.scrollHeight;
        }
    </script>
</body>
</html>
