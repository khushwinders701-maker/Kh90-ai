<!DOCTYPE html>
<html lang="pa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KH90 AI Pro</title>
    <style>
        :root { --primary: #f55036; --bg: #0d0d0d; --card: #1a1a1c; --text: #e0e0e0; }
        
        * { box-sizing: border-box; margin: 0; padding: 0; }

        html, body { 
            height: 100%; 
            background: var(--bg); 
            color: var(--text); 
            font-family: sans-serif; 
            overflow: hidden; 
        }

        /* Header - Fixed at Top */
        header { 
            position: fixed;
            top: 0; width: 100%;
            height: 60px;
            padding: 0 10px; 
            background: var(--card); 
            border-bottom: 2px solid var(--primary); 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            z-index: 1000;
        }
        .brand { display: flex; align-items: center; gap: 8px; }
        .logo-img { width: 32px; height: 32px; border-radius: 50%; border: 1px solid var(--primary); object-fit: cover; }
        .logo-text { font-weight: bold; color: var(--primary); font-size: 14px; text-transform: uppercase; }

        .nav-controls { display: flex; align-items: center; gap: 6px; }
        
        /* Multi-Language Dropdown */
        #langSelect { 
            background: #000; 
            color: #fff; 
            border: 1px solid #444; 
            border-radius: 4px; 
            padding: 4px; 
            font-size: 10px; 
            outline: none; 
        }

        .dl-btn { background: var(--primary); color: white; text-decoration: none; padding: 6px 10px; border-radius: 5px; font-weight: bold; font-size: 10px; }

        /* Chat Window */
        #chat-window { 
            height: calc(100% - 130px); 
            margin-top: 60px;
            overflow-y: auto; 
            padding: 15px; 
            display: flex; 
            flex-direction: column; 
            gap: 12px; 
            background: #000;
            padding-bottom: 20px;
        }

        .msg { max-width: 80%; padding: 12px; border-radius: 15px; font-size: 15px; line-height: 1.5; }
        .user { align-self: flex-end; background: var(--primary); color: white; border-bottom-right-radius: 2px; }
        .ai { align-self: flex-start; background: var(--card); border: 1px solid #333; border-bottom-left-radius: 2px; }

        /* Input Area - Fixed at Bottom */
        .input-area { 
            position: fixed;
            bottom: 0;
            width: 100%;
            height: 70px;
            padding: 10px 15px; 
            background: var(--card); 
            display: flex; 
            gap: 10px; 
            align-items: center; 
            border-top: 1px solid #333;
            z-index: 1000;
            padding-bottom: env(safe-area-inset-bottom);
        }

        input { 
            flex: 1; 
            padding: 12px 18px; 
            border-radius: 30px; 
            border: 1px solid #444; 
            background: #000; 
            color: white; 
            outline: none; 
            font-size: 16px; 
        }

        .btn { width: 45px; height: 45px; border-radius: 50%; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 20px; }
        .mic-btn { background: #2a2a2e; color: var(--primary); }
        .send-btn { background: var(--primary); color: white; }
        .active-mic { background: var(--primary) !important; color: white; box-shadow: 0 0 15px var(--primary); }
    </style>
</head>
<body>

    <header>
        <div class="brand">
            <img src="https://raw.githubusercontent.com/khushwinders701-maker/Kh90-ai/0264b401b679b3b8e7fc989859a220bb4e9cf303/Logo.png" class="logo-img" alt="Logo">
            <div class="logo-text">KH90 AI</div>
        </div>
        
        <div class="nav-controls">
            <select id="langSelect">
                <option value="pa-IN">ਪੰਜਾਬੀ</option>
                <option value="hi-IN">हिन्दी</option>
                <option value="en-US">English</option>
            </select>
            <a href="https://github.com/khushwinders701-maker/Kh90-ai/raw/0264b401b679b3b8e7fc989859a220bb4e9cf303/kh90%20ai.apk" class="dl-btn">📥 APK</a>
        </div>
    </header>

    <div id="chat-window">
        <div class="msg ai">ਸਤਿ ਸ੍ਰੀ ਅਕਾਲ!</div>
    </div>

    <div class="input-area">
        <button class="btn mic-btn" id="micBtn" onclick="toggleMic()">🎤</button>
        <input type="text" id="userInput" placeholder="ਸੁਨੇਹਾ ਲਿਖੋ..." autocomplete="off" onkeypress="if(event.key==='Enter') sendChat()">
        <button class="btn send-btn" onclick="sendChat()">➔</button>
    </div>

    <script>
        const API_KEY = "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";
        let recognition;
        let isListening = false;

        if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            recognition = new SpeechRecognition();
            recognition.continuous = false;
            
            recognition.onstart = () => { 
                isListening = true; 
                document.getElementById('micBtn').classList.add('active-mic'); 
            };
            recognition.onend = () => { 
                isListening = false; 
                document.getElementById('micBtn').classList.remove('active-mic'); 
            };
            recognition.onresult = (e) => { 
                document.getElementById('userInput').value = e.results[0][0].transcript; 
                sendChat(); 
            };
        }

        function toggleMic() {
            if (!recognition) return alert("ਮਾਈਕ ਸਪੋਰਟ ਨਹੀਂ ਹੈ।");
            if (isListening) {
                recognition.stop();
            } else {
                recognition.lang = document.getElementById('langSelect').value;
                recognition.start();
            }
        }

        async function sendChat() {
            const input = document.getElementById('userInput');
            const text = input.value.trim();
            if (!text) return;
            addMessage(text, 'user');
            input.value = "";
            
            const selectedLang = document.getElementById('langSelect').value;
            let systemMsg = "Reply in Punjabi language.";
            if(selectedLang === "hi-IN") systemMsg = "Reply in Hindi language.";
            if(selectedLang === "en-US") systemMsg = "Reply in English language.";

            try {
                const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: { "Authorization": `Bearer ${API_KEY}`, "Content-Type": "application/json" },
                    body: JSON.stringify({ 
                        model: "llama-3.3-70b-versatile", 
                        messages: [{role: "system", content: systemMsg}, {role:"user", content:text}] 
                    })
                });
                const data = await res.json();
                addMessage(data.choices[0].message.content, 'ai');
            } catch (e) { addMessage("Error!", 'ai'); }
        }

        function addMessage(text, sender) {
            const div = document.createElement('div');
            div.className = `msg ${sender}`;
            div.innerHTML = text.replace(/\n/g, '<br>');
            const chat = document.getElementById('chat-window');
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
        }
    </script>
</body>
</html>
